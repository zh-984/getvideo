<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- ★ 破防盗链核心：告诉浏览器不发送 Referer，绕过 CDN 的 Referer 校验 -->
<meta name="referrer" content="no-referrer">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFF8F6">
<title>GetVideo</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/artplayer@5.1.1/dist/artplayer.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FFF8F6;--card:#FFFFFF;--pink:#FFB5C2;--pink-d:#FF8FA3;
  --mint:#B5EAD7;--lavender:#C3B1E1;--peach:#FFDAB9;--sky:#A8D8EA;
  --text:#5A5A6E;--text2:#9A9AB0;--text3:#C5C5D6;--border:#F0E8E4;--r:14px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Nunito','PingFang SC',sans-serif;-webkit-font-smoothing:antialiased}
input,button{font-family:inherit;outline:none;border:none;background:none}
::-webkit-scrollbar{width:0}

.hdr{position:sticky;top:0;z-index:50;padding:14px 18px 12px;background:rgba(255,248,246,.9);backdrop-filter:blur(20px)}
.logo{font-size:18px;font-weight:800;margin-bottom:12px;letter-spacing:-.5px}
.logo b{color:var(--pink-d)}.logo span{color:var(--mint)}
.srow{display:flex;gap:10px}
.sinp{flex:1;height:40px;padding:0 16px;border-radius:20px;background:var(--card);color:var(--text);font-size:13px;font-weight:500;border:1.5px solid var(--border);transition:all .25s;box-shadow:0 2px 12px rgba(255,182,194,.12)}
.sinp:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,181,194,.2)}
.sinp::placeholder{color:var(--text3)}
.sbtn{height:40px;padding:0 20px;border-radius:20px;background:linear-gradient(135deg,var(--pink),var(--pink-d));color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 3px 12px rgba(255,143,163,.3);white-space:nowrap}
.sbtn:active{transform:scale(.95)}.sbtn:disabled{opacity:.5;transform:none}

.ri{padding:12px 20px 4px;font-size:11px;color:var(--text3);font-weight:500}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;padding:10px 16px 24px}
@media(max-width:768px){.grid{grid-template-columns:repeat(4,1fr);gap:10px;padding:10px 12px 20px}}
@media(max-width:400px){.grid{grid-template-columns:repeat(3,1fr);gap:8px}}
.cd{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .18s;box-shadow:0 1px 6px rgba(255,182,194,.1)}
.cd:active{transform:scale(.96)}
.cd-img{width:100%;aspect-ratio:2/3;object-fit:cover;background:#FFF0F0;display:block}
.cd:nth-child(6n+1) .cd-img{border-bottom:2px solid var(--pink)}
.cd:nth-child(6n+2) .cd-img{border-bottom:2px solid var(--mint)}
.cd:nth-child(6n+3) .cd-img{border-bottom:2px solid var(--lavender)}
.cd:nth-child(6n+4) .cd-img{border-bottom:2px solid var(--peach)}
.cd:nth-child(6n+5) .cd-img{border-bottom:2px solid var(--sky)}
.cd:nth-child(6n+6) .cd-img{border-bottom:2px solid #FFF5BA}
.cd-bd{padding:5px 6px 7px}
.cd-t{font-size:10px;font-weight:700;color:#5A5A6E;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cd-m{margin-top:2px;font-size:8.5px;color:var(--text3);font-weight:500}

.empty{text-align:center;padding:70px 24px 30px}
.ei{font-size:56px;margin-bottom:18px}
.et{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.es{font-size:12px;color:var(--text3);margin-bottom:28px}
.tags{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.tag{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.tag:nth-child(6n+1){background:rgba(255,181,194,.2);color:#e07080}
.tag:nth-child(6n+2){background:rgba(181,234,215,.25);color:#5bb88a}
.tag:nth-child(6n+3){background:rgba(195,177,225,.2);color:#9070c0}
.tag:nth-child(6n+4){background:rgba(255,218,185,.25);color:#d09050}
.tag:nth-child(6n+5){background:rgba(168,216,234,.25);color:#50a0c0}
.tag:nth-child(6n+6){background:rgba(255,245,186,.3);color:#b0a040}
.tag:active{transform:scale(.93)}

/* ── 搜索历史 ── */
.hist{margin:20px 24px 0;text-align:left}
.hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hist-head span:first-child{font-size:12px;font-weight:600;color:var(--text2)}
.hist-clear{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 8px;border-radius:10px;background:var(--card);border:1px solid var(--border)}
.hist-clear:active{background:var(--pink);color:#fff;border-color:var(--pink)}
.hist-list{display:flex;flex-wrap:wrap;gap:8px}
.hist-item{
  padding:5px 14px;border-radius:16px;font-size:11px;font-weight:500;
  background:var(--card);color:var(--text2);cursor:pointer;
  border:1px solid var(--border);transition:all .15s;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.hist-item:active{background:var(--pink);color:#fff;border-color:var(--pink)}

/* ── 安全提醒 ── */
.warn{display:flex;align-items:center;gap:8px;padding:8px 18px;margin:8px 18px 0;border-radius:10px;background:linear-gradient(135deg,rgba(255,182,194,.15),rgba(255,218,185,.15));border:1px solid rgba(255,182,194,.25)}
.warn-icon{font-size:14px;flex-shrink:0}
.warn-text{font-size:10.5px;color:#c07070;font-weight:500;line-height:1.4;flex:1}
.warn-close{font-size:14px;color:#ccc;cursor:pointer;padding:2px 4px;flex-shrink:0;opacity:.5}
.warn-close:hover{opacity:1}

/* ── 推荐影片 ── */
.rec-section{padding:8px 18px 28px;margin-top:8px;text-align:center}
.rec-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px}
.rec-row{display:flex;flex-wrap:wrap;justify-content:center;gap:16px}
.rec-card{flex-shrink:0;width:100px;cursor:pointer;transition:transform .15s}
.rec-card:active{transform:scale(.95)}
.rec-img{width:100px;height:140px;object-fit:cover;border-radius:10px;background:#FFF0F0;display:block;box-shadow:0 2px 10px rgba(255,182,194,.15)}
.rec-card:nth-child(odd) .rec-img{border-bottom:2.5px solid var(--pink)}
.rec-card:nth-child(even) .rec-img{border-bottom:2.5px solid var(--mint)}
.rec-name{margin-top:6px;font-size:10.5px;font-weight:600;color:#5A5A6E;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:768px){.rec-section{display:none}}

.ld{text-align:center;padding:70px 24px}
.dots{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.dot{width:10px;height:10px;border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(1){background:var(--pink);animation-delay:0s}
.dot:nth-child(2){background:var(--mint);animation-delay:.15s}
.dot:nth-child(3){background:var(--lavender);animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-12px)}}

.ply{position:relative;width:100%;background:#000;aspect-ratio:16/9;max-height:55vh;overflow:hidden}
.ply .artplayer-app{width:100%!important;height:100%!important}
/* 非播放状态时强制隐藏残留的播放器 */
body:not(.state-playing) .artplayer-app,
body:not(.state-playing) video,
body:not(.state-playing) iframe,
body:not(.state-playing) [class*="art-"]{
  display:none!important;visibility:hidden!important;opacity:0!important;
  pointer-events:none!important;position:fixed!important;top:-9999px!important;left:-9999px!important;
  width:0!important;height:0!important;z-index:-9999!important;overflow:hidden!important;
}

.nav{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--bg);border-bottom:1px solid var(--border)}
.nb{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--lavender),var(--sky));color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 2px 8px rgba(195,177,225,.3)}
.nb:active{transform:scale(.9)}
.nt{font-size:14px;font-weight:700;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr2{display:flex;align-items:center;gap:10px;padding:12px 18px 0}
.nt2{font-size:13px;font-weight:600;color:var(--text2);flex:1}

.tbar{display:flex;gap:7px;align-items:center;padding:10px 18px;overflow-x:auto}
.pl{padding:6px 13px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;background:var(--card);color:var(--text2);border:1.5px solid var(--border)}
.pl:active{transform:scale(.93)}.pl.on{background:linear-gradient(135deg,var(--mint),#7DD4B0);border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(125,212,176,.3)}

.ep{padding:4px 18px 16px}
.eh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.eh h3{font-size:13px;font-weight:700;color:var(--text)}
.eh span{font-size:11px;color:var(--text3);font-weight:500}
.ew{display:flex;flex-wrap:wrap;gap:8px;max-height:130px;overflow-y:auto}
.ec{padding:7px 13px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;background:var(--card);color:var(--text2);border:1.5px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.03)}
.ec:active{transform:scale(.93)}
.ec:nth-child(4n+1).on{background:linear-gradient(135deg,var(--pink),var(--pink-d))}
.ec:nth-child(4n+2).on{background:linear-gradient(135deg,var(--mint),#7DD4B0)}
.ec:nth-child(4n+3).on{background:linear-gradient(135deg,var(--lavender),#A78BDB)}
.ec:nth-child(4n+4).on{background:linear-gradient(135deg,var(--sky),#7BC4DE)}
.ec.on{border-color:transparent;color:#fff;box-shadow:0 2px 10px rgba(255,143,163,.3)}

.db{text-align:center;padding:0 18px 10px}
.db button{font-size:10px;color:var(--text3);cursor:pointer;font-weight:500;opacity:.6}
.dbox{margin:0 18px 20px;padding:10px 12px;border-radius:10px;background:var(--card);border:1px solid var(--border);max-height:100px;overflow-y:auto;font-family:'SF Mono',monospace;font-size:10px;line-height:1.7;box-shadow:0 2px 12px rgba(255,182,194,.12)}
.d-ok{color:#5bb88a}.d-w{color:#d0a030}.d-e{color:#e07080}.d-i{color:#7BC4DE}.d-t{color:var(--text3);margin-right:4px}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><b>G</b>et<span>V</span>ideo</div>
  <div class="srow">
    <input id="kw" class="sinp" type="search" inputmode="search" placeholder="搜索影片…" autocomplete="off">
    <button id="sbtn" class="sbtn" onclick="doSearch()">搜索</button>
  </div>
</div>

<div id="app"></div>

<script>
const API = '';
let art=null, hls=null, state='idle', results=[], film=null, eps=[], curEp=0, logs=[], recs=[];
let history=JSON.parse(localStorage.getItem('gv_history')||'[]');
const $app=document.getElementById('app'), $kw=document.getElementById('kw'), $sbtn=document.getElementById('sbtn');
$kw.addEventListener('keyup',e=>{if(e.key==='Enter')doSearch()});

function saveHistory(kw){
  history=history.filter(h=>h!==kw);
  history.unshift(kw);
  if(history.length>20)history=history.slice(0,20);
  localStorage.setItem('gv_history',JSON.stringify(history));
}
function clearHistory(){
  history=[];
  localStorage.removeItem('gv_history');
  if(state==='idle')render();
}

// ── 页面加载时获取推荐影片（8 部最新内容） ──
(async()=>{
  const kws=['2026','2025 电影','最新电影'];
  for(const kw of kws){
    try{
      const r=await fetch(`${API}/api/search?keyword=${encodeURIComponent(kw)}`);
      const d=await r.json();
      if(d.results?.length){
        recs=d.results.slice(0,8);
        if(state==='idle') render();
        break;
      }
    }catch(e){/* 继续试下一个 */}
  }
})();

// ══════════════════════════════════════
//  History API — 手机返回键导航
//  idle ← results ← playing
//  主界面再按返回 = 退出网站（浏览器默认行为）
// ══════════════════════════════════════

function pushPage(label){
  history.pushState({page:label}, '', '');
}

window.addEventListener('popstate', (e) => {
  // 手机返回键 / 浏览器后退 → 先销毁播放器再切状态
  if(state==='playing'){
    backToResults();
  } else if(state==='results' || state==='searching'){
    backToHome();
  }
});

// ★ 手机切后台再回来时，强制同步 state 和 DOM
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    try { if (art?.video) art.video.pause(); } catch(e) {}
  } else {
    // 回到前台：如果不在播放页，暴力清除所有可能的残留
    if (state !== 'playing') {
      if (art) { destroyPlayer(); render(); }
      // 兜底：即使 art 是 null，也删掉页面上所有 video/iframe
      document.querySelectorAll('video, iframe').forEach(v => {
        try { if(v.pause) v.pause(); v.remove(); } catch(e) {}
      });
    }
  }
});

// ★ 页面从浏览器缓存恢复时也会触发（手机切后台回来的另一种情况）
window.addEventListener('pageshow', (e) => {
  if (e.persisted) syncPlayerState();
});

// 统一的状态同步函数
function syncPlayerState(){
  // 不在播放页但播放器实例还在 → 强制清理
  if (state !== 'playing' && art) {
    destroyPlayer();
    render();
  }
}

// ★ 定时检查器：每 500ms 检测一次
//   不依赖 DOM 查询，直接用 JS 全局变量 art 判断
//   art 有值 = 播放器实例还活着，必须在非播放状态时清理
setInterval(() => {
  if (state !== 'playing' && art) {
    console.warn('[guard] 非播放状态发现残留播放器实例，强制清理');
    destroyPlayer();
    render();
  }
}, 500);

// ★★ MutationObserver：监听 DOM 变化，发现非播放状态下出现 video 元素立即移除
//   这是终极防护，不管 video 元素是怎么出现的（ArtPlayer 残留、浏览器恢复、微任务创建）
const _bodyGuard = new MutationObserver((mutations) => {
  if (state === 'playing') return; // 正在播放不管
  for (const m of mutations) {
    for (const node of m.addedNodes) {
      if (node.nodeType !== 1) continue; // 只看元素节点
      // 如果添加的元素是 video，或者包含 video，或者 class 含 art-
      if (node.tagName === 'VIDEO' || node.tagName === 'IFRAME' ||
          (node.className && typeof node.className === 'string' && node.className.includes('art-'))) {
        console.warn('[MutationObserver] 非播放状态发现残留元素，移除:', node.tagName, node.className);
        try { if (node.pause) node.pause(); node.remove(); } catch(e) {}
      }
      // 也检查添加元素的子节点
      if (node.querySelectorAll) {
        node.querySelectorAll('video, iframe, [class*="art-"]').forEach(el => {
          console.warn('[MutationObserver] 移除子元素:', el.tagName);
          try { if (el.pause) el.pause(); el.remove(); } catch(e) {}
        });
      }
    }
  }
});
_bodyGuard.observe(document.body, { childList: true, subtree: true });

// ── 搜索 ──
async function doSearch(){
  const kw=$kw.value.trim(); if(!kw)return;
  saveHistory(kw);
  pushPage('results');  // 记录历史，让返回键能回来
  $sbtn.disabled=true; $sbtn.textContent='…'; state='searching'; render();
  try{
    const r=await fetch(`${API}/api/search?keyword=${encodeURIComponent(kw)}`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    results=d.results||[];
    state='results'; log('ok',`${results.length} 条结果`);
  }catch(e){log('err','搜索: '+e.message); state='results'; results=[]}
  finally{$sbtn.disabled=false; $sbtn.textContent='搜索'; render()}
}

// ── 选中影片 ──
function selectFilm(idx){
  pushPage('playing');  // 记录历史
  film=results[idx]; eps=film.episodes||[]; curEp=0; state='playing';
  log('info',film.title+' · '+eps.length+'个地址');
  render();
  if(eps.length) playEp(0);
}

// ── 返回函数 ──
function destroyPlayer(){
  // 1. 先暂停视频，阻止继续加载
  try{if(art?.video){art.video.pause();art.video.removeAttribute('src');art.video.load();}}catch(e){}
  // 2. 销毁 hls
  try{if(hls){hls.destroy();hls=null;}}catch(e){}
  // 3. 销毁 ArtPlayer
  try{if(art){art.destroy();art=null;}}catch(e){}
  // 4. 强制清空播放器容器
  const box=document.getElementById('player-box');
  if(box) box.innerHTML='';
  // 5. 清除所有 ArtPlayer 残留（用 class 前缀匹配，覆盖全部 art- 元素）
  document.querySelectorAll('[class*="art-"]').forEach(el=>{try{el.remove();}catch(e){}});
  // 6. 清除所有 video 元素（ArtPlayer 有时在 body 上创建额外 video）
  document.querySelectorAll('video, iframe').forEach(v=>{
    try{
      if(v.pause) v.pause();
      v.src='';
      v.removeAttribute('src');
      if(v.load) v.load();
      v.style.display='none';
      v.remove();
    }catch(e){}
  });
  // 7. 恢复 body 样式
  document.body.style.overflow='';
  document.body.style.position='';
  document.body.style.width='';
  document.body.style.height='';
  // 8. 退出全屏
  try{if(document.fullscreenElement)document.exitFullscreen();}catch(e){}
  try{if(document.webkitFullscreenElement)document.webkitExitFullscreen();}catch(e){}
}

function backToResults(){
  destroyPlayer();
  film=null;eps=[];state='results';render();
}
function backToHome(){
  destroyPlayer();
  film=null;eps=[];results=[];state='idle';render();
}

// ── 播放 ──
let proxyMode = 0; // 0=节流模式 1=全代理模式

// ★ Toast 提示函数
function showToast(msg,duration=3000){
  let t=document.getElementById('gv-toast');
  if(!t){t=document.createElement('div');t.id='gv-toast';
    t.style.cssText='position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;'+
    'padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;'+
    'background:linear-gradient(135deg,#FF8FA3,#A78BDB);box-shadow:0 4px 16px rgba(0,0,0,.15);'+
    'pointer-events:none;opacity:0;transition:opacity .3s;max-width:80vw;text-align:center';
    document.body.appendChild(t);
  }
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>{t.style.opacity='0';},duration);
}

async function playEp(idx){
  const ep=eps[idx]; if(!ep?.url)return;
  curEp=idx; proxyMode=0; render(); log('info',`#${idx+1} ${ep.label}`);

  let playUrl=ep.url;
  const isM3u8=playUrl.includes('.m3u8');

  if(isM3u8){
    playUrl=`${API}/api/m3u8?url=${encodeURIComponent(playUrl)}`;
    log('ok','节流模式（.ts 直连 CDN）');
  }

  initPlayer(playUrl);
}

// ★ 新的降级策略：先切源，最后才走代理（防爆）
function fallbackFromError(){
  // 第 1 优先：切换到下一集（同一个站的不同源）
  if(curEp<eps.length-1){
    showToast('当前资源不可用，正在自动切源…');
    log('warn','切源 → 下一集');
    playEp(curEp+1);
    return true;
  }
  // 第 2 优先：全代理模式（仅当所有集都试过才用，且有 50MB 熔断保护）
  if(proxyMode<1){
    proxyMode=1;
    showToast('正在通过安全通道解析…（有流量保护）');
    log('warn','所有直连失败 → 全代理模式（50MB 熔断）');
    const ep=eps[curEp]; if(!ep?.url) return false;
    const url=`${API}/api/m3u8?url=${encodeURIComponent(ep.url)}&full=1`;
    initPlayer(url);
    return true;
  }
  // 全部失败
  showToast('所有资源均不可用，请换一部影片');
  log('err','所有尝试均失败');
  return false;
}

// ── ArtPlayer + hls.js ──
function initPlayer(source){
  destroyPlayer();
  const box=document.getElementById('player-box'); if(!box)return;

  const isM3u8=typeof source==='string'&&(source.includes('.m3u8')||source.includes('m3u8'));

  art=new Artplayer({
    container:box, url:source,
    type:isM3u8?'m3u8':'mp4',
    autoplay:true, autoSize:false, autoMini:true, loop:false,
    flip:true, playbackRate:true, aspectRatio:true,
    fullscreen:true, fullscreenWeb:true, miniProgressBar:true,
    mutex:true, backdrop:true, playsInline:true,
    theme:'#FFB5C2', lang:navigator.language.includes('zh')?'zh-cn':'en',
    customType:{
      m3u8(video,url){
        if(!Hls.isSupported()){
          if(video.canPlayType('application/vnd.apple.mpegurl'))video.src=url;
          else log('err','浏览器不支持 HLS'); return;
        }
        hls=new Hls({maxBufferLength:30,maxMaxBufferLength:60});
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED,()=>{
          video.play().catch(()=>{});
          log('ok','✓ 就绪，直连 CDN 播放');
        });
        let fragCount=0;
        hls.on(Hls.Events.FRAG_LOADED,(_,d)=>{
          fragCount++;
          if(fragCount%50===1)log('ok','✓ 已加载 '+fragCount+' 个分片');
        });
        hls.on(Hls.Events.ERROR,(_,d)=>{
          log('err','hls: '+d.details+' fatal='+d.fatal);
          if(!d.fatal)return;
          if(d.type===Hls.ErrorTypes.NETWORK_ERROR){
            // ★ 新策略：先切源，最后才走代理（有 50MB 熔断保护）
            fallbackFromError();
          } else if(d.type===Hls.ErrorTypes.MEDIA_ERROR){
            hls.recoverMediaError();
          } else {
            fallbackFromError();
          }
        });
        art.hls=hls;
      },
    },
  });
  art.on('video:playing',()=>log('ok','▶ 播放中'));
  art.on('videoPlaybackRate',r=>{document.querySelectorAll('.pl[data-s]').forEach(e=>e.classList.toggle('on',+e.dataset.s===r))});
}

// ── 渲染 ──
const PH="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 4'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23FFE0E6'/%3E%3Cstop offset='1' stop-color='%23E0F0FF'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill='url(%23g)' width='3' height='4'/%3E%3Ctext x='1.5' y='2.3' text-anchor='middle' fill='%23ccc' font-size='.55'%3E🎬%3C/text%3E%3C/svg%3E";
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function render(){
  let h='';
  // 标记当前状态（CSS 用 body class 控制播放器显示/隐藏）
  document.body.className = 'state-'+state;
  if(state==='idle'){
    h=`<div class="empty"><div class="ei">🧁</div><div class="et">想看什么？</div><div class="es">搜索影片名称，或点击下方标签</div>
    <div class="tags">
      <span class="tag" onclick="hot(this)">蜘蛛侠</span><span class="tag" onclick="hot(this)">哈利波特</span>
      <span class="tag" onclick="hot(this)">三体</span><span class="tag" onclick="hot(this)">甄嬛传</span>
      <span class="tag" onclick="hot(this)">你的名字</span><span class="tag" onclick="hot(this)">灌篮高手</span>
      <span class="tag" onclick="hot(this)">流浪地球</span><span class="tag" onclick="hot(this)">复仇者联盟</span>
    </div>
    ${history.length?`<div class="hist"><div class="hist-head"><span>🕐 搜索历史</span><span class="hist-clear" onclick="clearHistory()">清空</span></div><div class="hist-list">${history.map(kw=>`<span class="hist-item" onclick="$kw.value='${esc(kw)}';doSearch()">${esc(kw)}</span>`).join('')}</div></div>`:''}
    </div>
    ${recs.length?`<div class="rec-section">
      <div class="rec-title">🎬 推荐</div>
      <div class="rec-row">${recs.map((r,i)=>`
        <div class="rec-card" onclick="playRec(${i})">
          <img class="rec-img" loading="lazy" src="${esc(r.cover)||PH}" onerror="this.src='${PH}'">
          <div class="rec-name">${esc(r.title)}</div>
        </div>`).join('')}
      </div>
    </div>`:''}`;
  }
  if(state==='searching'){
    h=`<div class="ld"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div style="font-size:12px;color:var(--text3)">正在搜索…</div></div>`;
  }
  if(state==='results'){
    if(!results.length){
      h=`<div class="hdr2"><div class="nb" onclick="backToHome()">←</div><div class="nt2">搜索结果</div></div>
      <div class="empty"><div class="ei">🫧</div><div class="et">没有找到</div><div class="es">换个关键词试试</div></div>`;
    }else{
      h=`<div class="hdr2"><div class="nb" onclick="backToHome()">←</div><div class="nt2">共 ${results.length} 条结果</div></div>
      <div class="grid">${results.map((r,i)=>`
        <div class="cd" onclick="selectFilm(${i})">
          <img class="cd-img" loading="lazy" src="${esc(r.cover)||PH}" onerror="this.src='${PH}'">
          <div class="cd-bd"><div class="cd-t">${esc(r.title)}</div><div class="cd-m">${esc(r.snippet||r.year||r.site)}</div></div>
        </div>`).join('')}</div>`;
    }
  }
  if(state==='playing'){
    h=`<div class="nav"><div class="nb" onclick="backToResults()">←</div><div class="nt">${esc(film?.title||'')}</div></div>
    <div class="ply"><div id="player-box" style="width:100%;height:100%"></div></div>
    <div class="warn" style="margin:8px 18px"><span class="warn-icon">⚠️</span><span class="warn-text">请勿相信视频中的任何广告、二维码、联系方式等，尤其是视频全屏后的广告，谨防诈骗！！！</span><span class="warn-close" onclick="this.parentElement.style.display='none'">✕</span></div>
    <div class="tbar">${[0.5,0.75,1,1.25,1.5,2,3].map(s=>`<span class="pl" data-s="${s}" onclick="setSpeed(${s})">${s}×</span>`).join('')}</div>
    ${eps.length?`<div class="ep"><div class="eh"><h3>选集</h3><span>${eps.length} 集</span></div>
    <div class="ew">${eps.map((ep,i)=>`<span class="ec ${i===curEp?'on':''}" onclick="playEp(${i})">${esc(ep.label||String(i+1))}</span>`).join('')}</div></div>`:''}
    <div class="db"><button onclick="toggleDebug()">调试日志</button></div>
    <div class="dbox" id="dbg" style="display:none">${logs.map(l=>`<div><span class="d-t">${l.t}</span><span class="d-${l.l==='ok'?'ok':l.l==='warn'?'w':l.l==='err'?'e':'i'}">[${l.l}]</span> ${esc(l.m)}</div>`).join('')}</div>`;
  }
  $app.innerHTML=h;
  if(state==='playing'&&eps.length&&eps[curEp])
    requestAnimationFrame(()=>{const b=document.getElementById('player-box');if(b&&!art)playEp(curEp)});
}

function setSpeed(s){if(art)art.playbackRate=s}
function toggleDebug(){const p=document.getElementById('dbg');if(p)p.style.display=p.style.display==='none'?'block':'none'}
function playRec(idx){pushPage('playing');film=recs[idx];eps=film.episodes||[];curEp=0;state='playing';log('info',film.title);render();if(eps.length)playEp(0)}
function hot(el){$kw.value=el.textContent;doSearch()}
function log(level,msg){logs.push({t:new Date().toLocaleTimeString('zh-CN',{hour12:false}),l:level,m:msg});if(logs.length>60)logs.shift();console.log(`[${level}]${msg}`)}

render();
</script>
